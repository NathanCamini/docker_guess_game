name: demo-game-infra

networks:
  game_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  db:
    image: postgres:16
    container_name: guess_game_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - game_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: demo-game-backend:v1.0.0
    restart: unless-stopped
    environment:
      - FLASK_APP=run.py
      - FLASK_DB_TYPE=postgres
      - FLASK_DB_USER=postgres
      - FLASK_DB_NAME=postgres
      - FLASK_DB_PASSWORD=secretpass
      - FLASK_DB_HOST=db
      - FLASK_DB_PORT=5432
    networks:
      - game_network
    deploy:
      replicas: 3 # Cria 3 instâncias

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: demo-game-frontend:v1.0.0
    container_name: game_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - game_network
    depends_on:
      - backend
